<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | TUKLAS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <aside class="sidebar text-center">
        <h3 class="fw-bold mb-5" style="color: var(--bulsu-maroon)">TUKLAS ADMIN</h3>
        <nav class="text-start">
            <a onclick="showView('dashboard')" id="dash-link" class="nav-link-custom active"><i class="fas fa-home"></i> Dashboard</a>
            <a onclick="showView('accounts')" id="acc-link" class="nav-link-custom"><i class="fas fa-user-shield"></i> Account Management</a>
            <a onclick="showView('items')" id="item-link" class="nav-link-custom"><i class="fas fa-box"></i> Registered Items</a>
            <a onclick="showView('history')" id="hist-link" class="nav-link-custom"><i class="fas fa-history"></i> Activity History</a>
            <a href="login.html" class="nav-link-custom text-danger mt-5"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
    </aside>

    <main class="main-content">
        <div id="dashboard" class="content-view active">
            <div class="p-5 bg-dark text-white rounded-4 shadow mb-4"><h1>Welcome, Admin!</h1></div>
            <button class="btn btn-danger py-3 px-5 fw-bold" data-bs-toggle="modal" data-bs-target="#regModal">REGISTER FOUND ITEM</button>
        </div>

        <div id="accounts" class="content-view">
            <h2 class="fw-bold mb-4">Account Management</h2>
            <div class="card p-3 border-0 shadow-sm text-center">
                <table class="table">
                    <thead><tr><th>Name</th><th>ID Number</th><th>Role</th></tr></thead>
                    <tbody id="accTable"><tr><td>Admin User</td><td>2021-0001</td><td>Admin</td></tr></tbody>
                </table>
            </div>
        </div>

        <div id="items" class="content-view">
            <h2 class="fw-bold mb-4">Registered Items</h2>
            <div class="card p-3 border-0 shadow-sm">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Founder</th>
                            <th>Location</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemTable"></tbody>
                </table>
            </div>
        </div>

        <div id="history" class="content-view">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold m-0">Activity History</h2>
                <button class="btn btn-outline-secondary btn-clear" onclick="clearHistory()">Clear All</button>
            </div>
            <div id="histLogs"></div>
        </div>
    </main>

    <div class="modal fade" id="regModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header"><h5 class="fw-bold">New Found Item</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="regForm">
                        <div class="mb-3"><label class="small fw-bold">Item Name</label><input type="text" id="itemName" class="form-control" required></div>
                        <div class="mb-3"><label class="small fw-bold">Founder</label><input type="text" id="founder" class="form-control" required></div>
                        <div class="mb-3"><label class="small fw-bold">Location</label><input type="text" id="loc" class="form-control" required></div>
                        <button type="submit" class="btn btn-danger w-100">Publish Info</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header"><h5 class="fw-bold">Edit Item Details</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editIndex">
                        <div class="mb-3"><label class="small fw-bold">Item Name</label><input type="text" id="editItemName" class="form-control" required></div>
                        <div class="mb-3"><label class="small fw-bold">Founder</label><input type="text" id="editFounder" class="form-control" required></div>
                        <div class="mb-3"><label class="small fw-bold">Location</label><input type="text" id="editLoc" class="form-control" required></div>
                        <button type="submit" class="btn btn-success w-100 text-white fw-bold">Update Item</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
