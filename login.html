<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUKLAS | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-card shadow-lg">
        <h2>TUKLAS</h2>
        <p class="text-muted small mb-4">BulSU Lost & Found</p>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label">BulSU ID Number</label>
                <input type="text" id="studentID" class="form-control" placeholder="" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <input type="password" id="passwordInput" class="form-control" required>
                    <span class="input-group-text" id="togglePasswordBtn">
                       
                    </span>
                </div>
            </div>

            <div class="mb-4 text-start">
                <label class="form-label">Login As</label>
                <select id="roleInput" class="form-select">
                    <option value="user">Student / User</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <button type="submit" class="btn-signin shadow">Sign In</button>
            <div class="mt-4 small">
                <p class="text-muted">Don't have an account? <a href="#" class="reg-link">Register</a></p>
            </div>
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
