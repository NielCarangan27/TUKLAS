<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUKLAS | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="login-card">
    <h2 style="color: var(--bulsu-maroon); font-weight: 800;">TUKLAS</h2>
    <p style="font-size: 0.85rem; color: #888; margin-bottom: 30px;">Sign in to your account</p>

    <form id="loginForm">
        <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-container">
                <input type="email" class="form-control" id="email" placeholder="Enter email" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="passwordInput">Password</label>
            <div class="input-container">
                <div class="input-group">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Enter password" required>
                    <span class="input-group-text" id="togglePasswordBtn">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="roleInput">Login as</label>
            <div class="input-container">
                <select class="form-select" id="roleInput">
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn-signin">Login</button>
    </form>

    <p id="loginError" style="display:none; color:red; margin-top:10px; font-size:0.85rem;">Invalid email or password. Please try again.</p>

    <p style="margin-top: 20px; font-size: 0.85rem; color: #666;">
        Don't have an account? <a href="register.html" class="reg-link" style="color: var(--bulsu-maroon); font-weight: 600; text-decoration: none;">Register here</a>
    </p>
</div>

<script>
    document.getElementById('togglePasswordBtn').addEventListener('click', function () {
        const input = document.getElementById('passwordInput');
        const icon  = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('passwordInput').value;
        const role     = document.getElementById('roleInput').value;
        const errEl    = document.getElementById('loginError');
        errEl.style.display = 'none';
        try {
            const res  = await fetch('api/auth.php?action=login', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({ email, password, role }),
            });
            const data = await res.json();
            if (!res.ok) {
                errEl.textContent   = data.error || 'Invalid credentials.';
                errEl.style.display = 'block';
                return;
            }
            sessionStorage.setItem('tuklas_user', JSON.stringify(data.user));
            window.location.href = data.user.role === 'admin' ? 'admin.html' : 'index.html';
        } catch (err) {
            errEl.textContent   = 'Could not reach the server. Please try again.';
            errEl.style.display = 'block';
        }
    });
</script>


</body>
</html>
